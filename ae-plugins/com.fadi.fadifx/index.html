<!doctype html>
<html>
	<head>
		<meta charset="UTF-8" />
		<title>fadiFX</title>
		<link rel="stylesheet" href="css/styles.css" />
	</head>
	<body>
		<div class="panel">
			<!-- Colors -->
			<div class="section">
				<div class="section-label">Colors</div>
				<div class="color-row" id="colorRow"></div>
				<div class="swatch-actions">
					<button id="orderedBtn" class="active">Ordered</button>
					<button id="customBtn">Custom</button>
				</div>
			</div>

			<!-- Timing -->
			<div class="section">
				<div class="section-label">Timing</div>
				<div class="row">
					<span class="row-label">Frames</span>
					<div class="chip-grid" id="frameChips"></div>
					<input
						type="number"
						class="chip-input"
						id="frameInput"
						min="1"
						max="60"
						value="5"
					/>
				</div>
				<div class="row">
					<span class="row-label">Strobe</span>
					<label class="toggle">
						<input type="checkbox" id="strobeToggle" />
						<span class="toggle-track"></span>
					</label>
				</div>
				<div class="row sub-row hidden" id="strobeGapRow">
					<span class="row-label">Gap</span>
					<div class="chip-grid" id="strobeChips"></div>
					<input
						type="number"
						class="chip-input"
						id="strobeInput"
						min="1"
						max="60"
						value="2"
					/>
				</div>
			</div>

			<!-- Cycle -->
			<div class="section">
				<div class="section-label">Cycle</div>
				<div class="row">
					<span class="row-label">Direction</span>
					<select id="direction">
						<option value="forward">Forward</option>
						<option value="reverse">Reverse</option>
						<option value="pingpong">Ping-Pong</option>
					</select>
				</div>
			</div>

			<!-- Pulse -->
			<div class="section">
				<div class="section-label">Pulse</div>
				<div class="row">
					<span class="row-label">Wave</span>
					<select id="waveformMode">
						<option value="off">Off</option>
						<option value="sine">Sine</option>
						<option value="triangle">Triangle</option>
						<option value="square">Square</option>
					</select>
				</div>
				<div class="row hidden" id="pulseSpeedRow">
					<span class="row-label">Speed</span>
					<div class="row-right">
						<input type="range" id="pulseSpeed" min="1" max="10" value="3" />
						<span class="val" id="pulseSpeedVal">3</span>
					</div>
				</div>
			</div>

			<!-- Output -->
			<div class="section">
				<div class="section-label">Output</div>
				<div class="row">
					<span class="row-label">Effect</span>
					<select id="applyMode">
						<option value="fill">Fill</option>
						<option value="tint">Tint</option>
						<option value="glow">Glow</option>
						<option value="solid">Solid</option>
					</select>
				</div>
				<div class="row">
					<span class="row-label">Duration</span>
					<label class="toggle">
						<input type="checkbox" id="matchLayerToggle" checked />
						<span class="toggle-track"></span>
					</label>
					<span style="font-size: 9px; color: var(--text-dim)"
						>match layer</span
					>
				</div>
				<div class="row hidden" id="totalDurationRow">
					<span class="row-label">Seconds</span>
					<input
						type="number"
						id="totalDuration"
						min="0.5"
						max="300"
						step="0.5"
						value="10"
					/>
				</div>
			</div>

			<button class="apply-btn" id="applyBtn">APPLY</button>
			<div class="status" id="status"></div>
		</div>

		<script src="lib/CSInterface.js"></script>
		<script src="js/main.js"></script>
	</body>
</html>
